      <text x="26" y="36" fill="#34d399">&#10003;</text><text x="56" y="36" fill="#dbe2ee">One-click shell</text>
    </g>
    <g transform="translate(596,486)">
      <rect width="226" height="56" rx="28" fill="#10141f" stroke="#26304a"/>
      <text x="26" y="36" fill="#34d399">&#10003;</text><text x="56" y="36" fill="#dbe2ee">Self-hosted</text>
    </g>
    <g transform="translate(838,486)">
      <rect width="262" height="56" rx="28" fill="#10141f" stroke="#26304a"/>
      <text x="26" y="36" fill="#34d399">&#10003;</text><text x="56" y="36" fill="#dbe2ee">27+ platforms, free</text>
